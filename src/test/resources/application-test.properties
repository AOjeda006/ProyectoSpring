# =============================================
# Perfil de test: base de datos H2 en memoria
# (no depende de la BD MySQL remota ni de Docker)
# =============================================
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# En tests el esquema lo crea Hibernate (create-drop); Flyway desactivado
spring.flyway.enabled=false

# Clave JWT de test (suficientemente larga para HS256)
jwt.secret=clave-de-test-suficientemente-larga-para-hmac-sha256-1234567890
jwt.access-expiration-ms=900000
jwt.refresh-expiration-ms=604800000

# Admin sembrado por DataInitializer
app.admin.username=admin
app.admin.password=admin1234
