spring.application.name=ProyectoSpring

# Perfil activo (dev por defecto; en prod: SPRING_PROFILES_ACTIVE=prod)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# =============================================
# Base de datos MySQL (credenciales externalizadas como variables de entorno).
# Los valores tras ':' son solo defaults de desarrollo local apuntando a un
# MySQL en localhost; NUNCA se versionan credenciales reales.
# =============================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/alumnos_db}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:alumnos_user}
spring.datasource.password=${DB_PASSWORD:}

# =============================================
# JPA / Hibernate
# El esquema lo gestiona Flyway; Hibernate solo valida que las entidades cuadren.
# =============================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=true
# Open Session In View activo: el mapeo entidad->DTO de asociaciones LAZY ocurre
# en la capa web, por lo que la sesión debe seguir abierta durante el render.
spring.jpa.open-in-view=true

# =============================================
# Flyway (migraciones versionadas en db/migration)
# baseline-on-migrate permite adoptar Flyway sobre una BD ya existente.
# =============================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# =============================================
# Swagger / OpenAPI
# =============================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# =============================================
# Seguridad JWT (externalizada)
# =============================================
jwt.secret=${JWT_SECRET:cambia-esta-clave-secreta-por-una-mas-larga-y-segura-de-al-menos-32-bytes}
jwt.access-expiration-ms=${JWT_ACCESS_EXPIRATION_MS:900000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# =============================================
# Usuario administrador inicial (externalizado)
# =============================================
app.admin.username=${ADMIN_USERNAME:admin}
app.admin.password=${ADMIN_PASSWORD:admin1234}

# =============================================
# Actuator (observabilidad)
# =============================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized
management.info.env.enabled=true
info.app.name=@project.name@
info.app.description=@project.description@
info.app.version=@project.version@
