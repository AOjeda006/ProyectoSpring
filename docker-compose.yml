# =====================================================================
# Orquestación local: API Spring Boot + MySQL 8
# Arranca todo con:  docker compose up --build
# La API queda en http://localhost:8080 (Swagger en /swagger-ui.html)
# =====================================================================
services:

  mysql:
    image: mysql:8.0
    container_name: proyectospring-mysql
    environment:
      MYSQL_DATABASE: alumnos_db
      MYSQL_USER: alumnos_user
      MYSQL_PASSWORD: alumnos_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_pass"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: proyectospring-api
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:mysql://mysql:3306/alumnos_db
      DB_USERNAME: alumnos_user
      DB_PASSWORD: alumnos_pass
      JWT_SECRET: clave-secreta-de-ejemplo-para-docker-cambiala-en-produccion-1234
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin1234
    ports:
      - "8080:8080"

volumes:
  mysql_data:
